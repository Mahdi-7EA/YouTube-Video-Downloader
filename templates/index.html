<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern YT Downloader</title>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="card">
        <div class="header">
            <!-- Simple SVG Icon -->
            <svg viewBox="0 0 24 24" fill="red" class="icon"><path d="M21.582,6.186c-0.23-0.86-0.908-1.538-1.768-1.768C18.254,4,12,4,12,4S5.746,4,4.186,4.418c-0.86,0.23-1.538,0.908-1.768,1.768C2,7.746,2,12,2,12s0,4.254,0.418,5.814c0.23,0.86,0.908,1.538,1.768,1.768C5.746,20,12,20,12,20s6.254,0,7.814-0.418c0.861-0.23,1.538-0.908,1.768-1.768C22,16.254,22,12,22,12S22,7.746,21.582,6.186z M10,15.464V8.536L16,12L10,15.464z"></path></svg>
            <h1>YT Downloader</h1>
        </div>
        <p>Download full quality 1080p MP4 videos instantly.</p>

        <form id="downloadForm">
            <div class="input-group">
                <input type="url" id="url" placeholder="Paste YouTube URL here..." required autocomplete="off">
            </div>
            <button type="submit" id="downloadBtn">
                <span id="btnText">Download Video</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        <div id="messageBox" class="message hidden"></div>
    </div>

    <!-- Link to external JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
